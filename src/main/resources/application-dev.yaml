spring:
  datasource:
    url: ${DEV_DB_URL :jdbc:postgresql://localhost:5432/depsight4j}
    driver-class-name: org.postgresql.Driver
    username: ${DEV_DB_USERNAME:postgres}
    password: ${DEV_DB_PASSWORD:Microsoft254$}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate # Forces discipline
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true # If Flyway finds existing db with no flyway history table, it baselines it and moves forward
  h2:
    console:
      enabled: false

logging:
  level:
    io.depsight: DEBUG
    org.hibernate.sql: DEBUG
